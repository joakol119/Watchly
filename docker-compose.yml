services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: watchly
      POSTGRES_PASSWORD: watchly123
      POSTGRES_DB: watchly
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchly"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://watchly:watchly123@db:5432/watchly
      JWT_SECRET: supersecretjwt
      PORT: 4001
      TMDB_API_KEY: 254a5d35a19b09f1b9e403cf412a6c17
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4001
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data: